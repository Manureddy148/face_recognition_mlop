version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FIRESTORE_PROJECT_ID=test-project
      - FLASK_ENV=development
      - FIRESTORE_EMULATOR_HOST=localhost:8080
    volumes:
      - ./backend:/app
    depends_on:
      - firestore-emulator
    networks:
      - attendance-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - attendance-network

  firestore-emulator:
    image: google/cloud-emulators:1.0.0
    ports:
      - "8080:8080"
    environment:
      - FIRESTORE_EMULATOR_PORT=8080
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge
