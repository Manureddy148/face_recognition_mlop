name: Scheduled Firestore Backup

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Manual trigger

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Create Firestore backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          gcloud firestore databases backup create \
            --database=default \
            --location=us-central1 \
            --display-name="backup_${TIMESTAMP}"
          echo "✅ Firestore backup created: backup_${TIMESTAMP}"

      - name: Log backup status
        run: |
          gcloud firestore backups list --location=us-central1 --limit=5
