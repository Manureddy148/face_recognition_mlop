name: Scheduled Firestore Backup

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_ACCOUNT: attendance-sa@project-e553cc0c-7d4a-4519-ade.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/149325054934/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Create Firestore backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          gcloud firestore databases backup create \
            --database='(default)' \
            --location=us-central1 \
            --display-name="backup_${TIMESTAMP}"
          echo "✅ Firestore backup created: backup_${TIMESTAMP}"

      - name: Log backup status
        run: |
          gcloud firestore backups list --location=us-central1 --limit=5
