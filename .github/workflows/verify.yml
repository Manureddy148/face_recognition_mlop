name: Verify PR Changes

on:
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check backend dependencies
        run: |
          pip install -r backend/requirements.txt --dry-run
          echo "✅ Backend dependencies verified"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Check frontend dependencies
        run: |
          cd frontend
          npm ci
          echo "✅ Frontend dependencies verified"

      - name: Verify Docker setup
        run: |
          docker build -t attendance-backend-verify -f backend/Dockerfile backend/
          docker build -t attendance-frontend-verify -f frontend/Dockerfile frontend/
          echo "✅ Docker builds verified"
