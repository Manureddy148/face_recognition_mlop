name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  BACKEND_SERVICE: attendance-backend
  FRONTEND_SERVICE: attendance-frontend
  SERVICE_ACCOUNT: attendance-sa@project-e553cc0c-7d4a-4519-ade.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/149325054934/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_lifetime: '3600s'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Validate required secrets
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "MONGODB_URI secret is missing or empty. Configure it in GitHub repository secrets."
            exit 1
          fi

      - name: Build backend Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.BACKEND_SERVICE }}:latest \
            -f backend/Dockerfile \
            backend/

      - name: Push backend image to Artifact Registry
        run: |
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.BACKEND_SERVICE }}:latest

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.BACKEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 2Gi \
            --cpu 2 \
            --timeout 600 \
            --max-instances 10 \
            --set-env-vars="FIRESTORE_PROJECT_ID=${{ env.PROJECT_ID }},FLASK_ENV=production,MONGODB_URI=${{ secrets.MONGODB_URI }}" \
            --service-account=${{ env.SERVICE_ACCOUNT }} \
            --allow-unauthenticated

      - name: Get backend service URL
        id: backend_url
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --region ${{ env.REGION }} --format='value(status.url)')
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $BACKEND_URL"

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend_url.outputs.url }} \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.FRONTEND_SERVICE }}:latest \
            -f frontend/Dockerfile \
            frontend/

      - name: Push frontend image to Artifact Registry
        run: |
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.FRONTEND_SERVICE }}:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/attendance/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --max-instances 10 \
            --set-env-vars="NEXT_PUBLIC_API_URL=${{ steps.backend_url.outputs.url }}" \
            --service-account=${{ env.SERVICE_ACCOUNT }} \
            --allow-unauthenticated

      - name: Get frontend service URL
        id: frontend_url
        run: |
          FRONTEND_URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --region ${{ env.REGION }} --format='value(status.url)')
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $FRONTEND_URL"

      - name: Run smoke tests
        run: |
          echo "Testing backend health check..."
          BACKEND_HEALTH_URL="${{ steps.backend_url.outputs.url }}/health"
          BACKEND_OK=false
          for i in {1..8}; do
            if curl -fsS --max-time 30 "$BACKEND_HEALTH_URL" > /tmp/backend-health.json; then
              echo "Backend health check passed on attempt $i"
              cat /tmp/backend-health.json
              BACKEND_OK=true
              break
            fi
            echo "Backend not ready yet (attempt $i), retrying..."
            sleep 10
          done
          if [ "$BACKEND_OK" = false ]; then
            echo "Backend health check failed after retries"
            exit 1
          fi
          echo ""
          echo "Testing frontend accessibility..."
          curl -fsSI --max-time 30 ${{ steps.frontend_url.outputs.url }}

      - name: Save deployment info
        run: |
          mkdir -p deployment-info
          echo "Backend: ${{ steps.backend_url.outputs.url }}" > deployment-info/urls.txt
          echo "Frontend: ${{ steps.frontend_url.outputs.url }}" >> deployment-info/urls.txt

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deployment-urls
          path: deployment-info/urls.txt

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
