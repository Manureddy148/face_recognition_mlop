# Cloud Run Deployment Configuration for Backend
# This file documents the Cloud Run configuration

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: attendance-backend
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '100'
    spec:
      containerConcurrency: 10
      timeoutSeconds: 600
      containers:
      - image: us-central1-docker.pkg.dev/PROJECT_ID/attendance/backend:latest
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
        env:
        - name: FIRESTORE_PROJECT_ID
          value: 'PROJECT_ID'
        - name: FLASK_ENV
          value: 'production'
        - name: CORS_ORIGINS
          value: 'http://localhost:3000,https://attendance-frontend-xxxxx.a.run.app'
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
  traffic:
  - latestRevision: true
    percent: 100
---
# Cloud Run Deployment Configuration for Frontend
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: attendance-frontend
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '50'
    spec:
      containerConcurrency: 50
      timeoutSeconds: 300
      containers:
      - image: us-central1-docker.pkg.dev/PROJECT_ID/attendance/frontend:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
        env:
        - name: NEXT_PUBLIC_API_URL
          value: 'https://attendance-backend-xxxxx.a.run.app'
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
  traffic:
  - latestRevision: true
    percent: 100
